<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Coach Dashboard</title>
<!-- patrick-coach auto-deploy LIVE -->
<style>
:root{
  color-scheme: light;
  --navy:#1f3864; --blue:#2e5496; --blue2:#4a78c0; --green:#1e6b41; --green2:#2e9e5f;
  --amber:#b9770e; --red:#9c2b2b; --ink:#1c2433; --muted:#6b7686; --line:#e2e8f1;
  --card:#ffffff; --bg:#f4f6fb; --soft:#f0f4fa; --shadow:0 1px 3px rgba(20,40,80,.08),0 4px 14px rgba(20,40,80,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:transparent;color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45}
.wrap{max-width:620px;margin:0 auto;padding:14px 12px 60px}
h1{font-size:20px;margin:0;letter-spacing:.2px}
.sub{color:var(--muted);font-size:12.5px;margin-top:2px}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--blue2));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex:0 0 auto}
.tabs{display:flex;background:var(--soft);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-bottom:14px;position:sticky;top:6px;z-index:5;backdrop-filter:saturate(1.2)}
.tab{flex:1;text-align:center;padding:10px 6px;border-radius:10px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;border:none;background:transparent;transition:.15s}
.tab.active{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h2{font-size:15px;margin:0 0 10px;display:flex;align-items:center;gap:7px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--soft);color:var(--blue)}
.muted{color:var(--muted)}
.row{display:flex;gap:8px;align-items:center}
.spread{display:flex;justify-content:space-between;align-items:center;gap:8px}
label.fld{display:block;font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:0 0 4px}
input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 10px;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--blue2)}
input[type=number]{-moz-appearance:textfield}
.btn{appearance:none;border:none;border-radius:11px;padding:11px 14px;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.12s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;width:100%}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}
.btn-ghost{background:var(--soft);color:var(--navy)}
.btn-sm{padding:8px 11px;font-size:13px}
.wk{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:6px}
.wkbtn{text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:10px 11px;cursor:pointer}
.wkbtn .t{font-weight:800;font-size:14px;color:var(--ink)}
.wkbtn .d{font-size:11px;color:var(--muted);margin-top:1px}
.wkbtn.sel{border-color:var(--blue);background:linear-gradient(180deg,#fff,#f3f7fd);box-shadow:var(--shadow)}
.wkbtn .next{font-size:10px;font-weight:800;color:var(--green2);text-transform:uppercase;letter-spacing:.5px}
.ex{border:1px solid var(--line);border-radius:13px;padding:11px;margin-bottom:10px;background:linear-gradient(180deg,#fff,#fcfdff)}
.ex .h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ex .name{font-weight:800;font-size:14.5px;line-height:1.25}
.ex .scheme{font-size:12px;color:var(--muted);margin-top:2px}
.tgt{flex:0 0 auto;text-align:right}
.tgt .w{font-weight:900;font-size:17px;color:var(--navy);white-space:nowrap}
.tgt .rng{font-size:11px;color:var(--muted)}
.sets{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.setbox{display:flex;flex-direction:column;align-items:center;gap:3px;width:62px}
.setbox-w{width:76px}
.setbox span{font-size:10px;font-weight:700;color:var(--muted)}
.setbox input{text-align:center;padding:7px 4px;font-weight:700;width:100%;font-size:14px}
.setbox .su{font-size:9px;font-weight:600;color:var(--muted);margin-top:-2px;letter-spacing:.3px}
.last{font-size:11.5px;color:var(--muted);margin-top:8px}
.formlink{color:var(--blue);text-decoration:none;font-weight:700;opacity:.85;white-space:nowrap}
.formlink:hover{opacity:1;text-decoration:underline}
.hint{font-size:11.5px;color:var(--green);margin-top:6px;font-weight:600}
.bars{margin:6px 0 2px}
.bar{height:11px;border-radius:7px;background:var(--soft);overflow:hidden;margin-top:5px}
.bar > i{display:block;height:100%;border-radius:7px;transition:width .35s ease}
.macro{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:8px}
.macro .m{background:var(--soft);border-radius:11px;padding:8px;text-align:center}
.macro .m .v{font-weight:900;font-size:16px}
.macro .m .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.meal{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line)}
.meal:last-child{border-bottom:none}
.meal .ml{font-weight:700;font-size:13.5px}
.meal .mm{font-size:11.5px;color:var(--muted)}
.del{border:none;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 16px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:50;max-width:90%;text-align:center;opacity:0;pointer-events:none;transition:.25s}
.toast.show{opacity:1}
.summary{background:linear-gradient(180deg,#f3f8f4,#eef6f0);border:1px solid #cfe6d8;border-radius:13px;padding:12px;margin-top:4px}
.summary .li{font-size:12.5px;padding:4px 0;border-bottom:1px dashed #d7e7dd;display:flex;gap:7px}
.summary .li:last-child{border-bottom:none}
.note{font-size:11.5px;color:var(--muted);background:var(--soft);border-radius:10px;padding:9px 11px;margin-top:8px;line-height:1.5}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.flex4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.tiny{font-size:11px}
.right{ text-align:right }
.linklike{color:var(--blue);font-weight:700;cursor:pointer;background:none;border:none;font-size:12px;padding:0}
canvas{max-width:100%}
.hidden{display:none!important}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo">P</div>
      <div>
        <h1>Coach Dashboard</h1>
        <div class="sub" id="dateSub"></div>
      </div>
    </div>
    <button class="linklike" id="settingsBtn">⚙︎ Reset</button>
  </div>

  <!-- ============ TRAINING ============ -->
  <section id="training">
    <div class="card">
      <h2>Today&rsquo;s workout</h2>
      <div class="wk" id="wkPicker"></div>
      <div class="muted tiny" id="rotHint" style="margin-top:4px"></div>
    </div>
    <div id="exList"></div>
    <button class="btn btn-primary" id="saveSession">Save session &amp; update targets</button>
    <div id="sessionSummary"></div>
    <div class="note">Auto-progression is on: hit the top of the rep range on <b>every</b> set and the working weight bumps up automatically next time. Otherwise keep the weight and chase reps. Always leave 1&ndash;2 reps in the tank &mdash; protect that shoulder.</div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script>
"use strict";
/* ---------------- Program ---------------- */
var PROGRAM = {
  "Full A": { tag:"Mon · squat + push/pull", ex:[
    {id:"fa1", name:"Goblet Squat", sets:3, lo:8, hi:12, start:23, inc:2, unit:"kg", lastSession:"23 kg × 9/9/9 — MAX effort (2026-06-22)"},
    {id:"fa2", name:"Flat DB Press — neutral grip", sets:3, lo:8, hi:12, start:23, inc:2, unit:"kg", lastSession:"23 kg × 8/8/8 — jumped from 20, '20 felt light' (2026-06-22)"},
    {id:"fa3", name:"One-Arm DB Row", sets:3, lo:8, hi:12, start:25, inc:2.5, unit:"kg", side:true, lastSession:"23 kg × 12/12/12 — TOP, bumped to 25 kg (no 24 on DBs) (2026-06-22)"},
    {id:"fa4", name:"DB Romanian Deadlift", sets:2, lo:10, hi:12, start:25, inc:2, unit:"kg", perHand:true, lastSession:"23 kg × 11/11 — bumping to 25 (no 24 on DBs) (2026-06-22)"},
    {id:"fa5", name:"DB Biceps Curl", sets:2, lo:10, hi:15, start:11, inc:2, unit:"kg", lastSession:"11 kg × 12/12 — MAX effort (2026-06-22)"},
    {id:"fa6", name:"Plank", sets:2, lo:60, hi:75, start:12, inc:0, unit:"s", time:true, load:"12 kg vest", note:"12 kg weight vest", lastSession:"60 s / 60 s — TOP bodyweight; locked loaded: 12 kg vest going forward (2026-06-22)"}
  ]},
  "Full B": { tag:"Wed · hinge + vertical pull", ex:[
    {id:"fb1", name:"DB Romanian Deadlift", sets:3, lo:8, hi:12, start:25, inc:2, unit:"kg", perHand:true, lastSession:"25 kg × 9/9/9 — 11pm fatigue, stagnant vs Wk2 (2026-06-24)"},
    {id:"fb2", name:"Pull-Ups — neutral / chin", sets:3, lo:5, hi:10, start:0, inc:0, unit:"reps", bw:true, vestAt:true, note:"small black light band — target 7/7/7; band drops for set 1 once 10+/set", lastSession:"6 / 6 / 6 with small black band — 11pm fatigue, stagnant vs Wk2 (2026-06-24)"},
    {id:"fb3", name:"Low-Incline DB Press — neutral (~30°)", sets:3, lo:8, hi:12, start:23, inc:2, unit:"kg", lastSession:"23 kg × 6/6/6 — NEW working weight, jumped from 20, max effort (2026-06-24)"},
    {id:"fb4", name:"DB Bulgarian Split Squat", sets:2, lo:8, hi:10, start:14, inc:1, unit:"kg", side:true, lastSession:"11 kg × 10/10 per side — TOP, bumped to 14 kg (no 12 on DBs) (2026-06-24)"},
    {id:"fb5", name:"Hammer Curl", sets:2, lo:10, hi:15, start:14, inc:1, unit:"kg", lastSession:"14 kg × 12/12 — jumped 11 → 14 (no 12 on DBs) (2026-06-24)"},
    {id:"fb6", name:"Hanging Knee Raise", sets:2, lo:8, hi:10, start:4, inc:1, unit:"kg", note:"DB held between feet (planned — apply next Wed)", lastSession:"bodyweight × 8/8 — deload, 4 kg DB not applied (2026-06-24)"}
  ]},
  "Full C": { tag:"Fri · lunge + row + press", ex:[
    {id:"fc1", name:"DB Reverse Lunge", sets:3, lo:8, hi:10, start:11, inc:2, unit:"kg", side:true, lastSession:"11 kg × 8/8/8 per side (2026-06-12)"},
    {id:"fc2", name:"Chest-Supported Incline DB Row", sets:3, lo:10, hi:15, start:23, inc:2.5, unit:"kg", lastSession:"23 kg × 10/10/10 (2026-06-12)"},
    {id:"fc3", name:"Flat DB Press — neutral (proper flat bench)", sets:3, lo:8, hi:12, start:20, inc:2, unit:"kg", lastSession:"20 kg × 8/8/8 (2026-06-12)"},
    {id:"fc4", name:"Goblet Squat", sets:2, lo:10, hi:15, start:23, inc:2, unit:"kg", lastSession:"23 kg × 10/10 (2026-06-12)"},
    {id:"fc5", name:"DB Lying Triceps Extension", sets:2, lo:12, hi:15, start:9, inc:2, unit:"kg", lastSession:"9 kg × 10/10 — BELOW range, push reps (2026-06-12)"},
    {id:"fc6", name:"Rear-Delt Fly + Ext. Rotation", sets:2, lo:12, hi:15, start:4, inc:2, unit:"kg", lastSession:"4 kg × 10/10 — BELOW range, push reps (2026-06-12)"}
  ]}
};
var ROTATION = ["Full A","Full B","Full C"];

/* ---------------- State ---------------- */
var KEY = "coachData_v1";
var DEFAULT_TARGETS = { kcal:2400, protein:160, carbs:270, fat:75 };
var state = load();

function load(){
  try{
    var raw = localStorage.getItem(KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      if(parsed && !parsed.migratedV2){
        if(parsed.targets && parsed.targets.kcal===2400 && parsed.targets.protein===150){
          parsed.targets = { kcal:2300, protein:160, carbs:250, fat:70 };
        }
        parsed.migratedV2 = true;
      }
      if(parsed && !parsed.migratedV3){
        if(parsed.targets && parsed.targets.kcal===2300 && parsed.targets.protein===160){
          parsed.targets = { kcal:2400, protein:160, carbs:270, fat:75 };
        }
        parsed.migratedV3 = true;
      }
      return parsed;
    }
  }catch(e){}
  return { targets:Object.assign({},DEFAULT_TARGETS), food:{}, train:{ ex:{}, lastDone:0 }, selWk:1, migratedV2:true };
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

function exState(def){
  if(!state.train.ex[def.id]){
    state.train.ex[def.id] = { weight:def.start, history:[] };
  }
  return state.train.ex[def.id];
}
function round(x){ return Math.round(x*2)/2; }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function fmtW(v){ return (v % 1 === 0) ? v.toString() : v.toString(); }

function fmtSetsForSummary(e){
  var sets = e.sets;
  if(!sets.length) return '';
  if(e.isW){
    var ws = sets.map(function(s){return s.w;});
    var allSameW = ws.every(function(w){return w === ws[0];});
    var reps = sets.map(function(s){return s.reps;}).join('/');
    if(allSameW){
      return fmtW(ws[0])+e.unit+'×'+reps;
    } else {
      return sets.map(function(s){return fmtW(s.w)+e.unit+'×'+s.reps;}).join(', ');
    }
  } else if(e.time){
    return sets.map(function(s){return s.reps+'s';}).join('/');
  } else {
    return sets.map(function(s){return s.reps;}).join('/') + ' reps';
  }
}


function parseLastSession(str, ex){
  if(!str) return null;
  var top = /\bTOP\b/i.test(str);
  var m;
  if(ex.time){
    var times = str.match(/(\d+)\s*s\b/g);
    if(times && times.length){
      return { reps: times.map(function(t){ return parseInt(t,10); }), w:null, top:top };
    }
    return null;
  }
  m = str.match(/(\d+(?:\.\d+)?)\s*kg\s*×\s*(\d+(?:\/\d+)*)/);
  if(m){
    return { reps: m[2].split('/').map(function(x){ return parseInt(x,10); }),
             w: parseFloat(m[1]), top:top };
  }
  m = str.match(/(\d+(?:\s*\/\s*\d+)+)/);
  if(m){
    return { reps: m[1].split(/\s*\/\s*/).map(function(x){ return parseInt(x,10); }),
             w:null, top:top };
  }
  return null;
}

function targetRepsForSet(ex, setIdx, st){
  if(st.history && st.history.length){
    var last = st.history[st.history.length-1];
    if(last.sets && setIdx < last.sets.length){
      var lastReps = last.sets[setIdx].reps;
      if(typeof lastReps === "number"){
        var lastW = last.sets[setIdx].w;
        if(ex.inc>0 && typeof lastW === "number" && lastW < st.weight) return ex.lo;
        var t = lastReps + 1;
        if(t < ex.lo) t = ex.lo;
        if(t > ex.hi) t = ex.hi;
        return t;
      }
    }
  }
  var parsed = parseLastSession(ex.lastSession, ex);
  if(parsed && parsed.reps && setIdx < parsed.reps.length){
    if(parsed.top) return ex.lo;
    if(ex.inc>0 && parsed.w != null && parsed.w < st.weight) return ex.lo;
    var t2 = parsed.reps[setIdx] + 1;
    if(t2 < ex.lo) t2 = ex.lo;
    if(t2 > ex.hi) t2 = ex.hi;
    return t2;
  }
  return ex.lo;
}

function shareSession(){
  var text = window._lastSession || '';
  if(!text) return;
  if(navigator.share){
    navigator.share({text: text}).catch(function(){});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      toast('Copied — paste into Dispatch');
    });
  }
}

/* tabs removed — training only */

/* ---------------- Training render ---------------- */
function suggestedIndex(){ return (state.train.lastDone + 1 + ROTATION.length) % ROTATION.length; }

function renderWkPicker(){
  var picker = document.getElementById("wkPicker");
  picker.innerHTML = "";
  var sug = suggestedIndex();
  ROTATION.forEach(function(name, i){
    var def = PROGRAM[name];
    var el = document.createElement("button");
    el.className = "wkbtn" + (i===state.selWk ? " sel":"");
    el.innerHTML = (i===sug ? '<div class="next">▶ up next</div>':'') +
      '<div class="t">'+name+'</div><div class="d">'+def.tag+'</div>';
    el.addEventListener("click", function(){ state.selWk=i; save(); renderTraining(); });
    picker.appendChild(el);
  });
  var last = state.train.lastDone;
  document.getElementById("rotHint").textContent = last>=0
    ? "Last completed: "+ROTATION[last]+". Suggested next is marked ▶."
    : "Brand new — start with Full A (Mon). Ease in 2–3 weeks, then ramp the weights fast.";
}

function renderExercises(){
  var name = ROTATION[state.selWk];
  var def = PROGRAM[name];
  var list = document.getElementById("exList");
  list.innerHTML = "";
  def.ex.forEach(function(ex){
    var st = exState(ex);
    var isW = ex.inc>0;
    var tgtBig, tgtRng;
    if(isW){ tgtBig = fmtW(st.weight)+ex.unit; tgtRng = ex.lo+"–"+ex.hi+" reps"; }
    else if(ex.time){ tgtBig = "Hold"; tgtRng = ex.lo+"–"+ex.hi+" s"; }
    else { tgtBig = "Bodyweight"; tgtRng = ex.lo+"–"+ex.hi+" reps"; }

    var card = document.createElement("div");
    card.className = "ex";
    var setboxes = "";
    var unitLab = ex.time ? "sec" : "reps";
    for(var s=0;s<ex.sets;s++){
      var tReps = targetRepsForSet(ex, s, st);
      if(isW){
        setboxes += '<div class="setbox setbox-w"><span>Set '+(s+1)+'</span>'+
          '<input type="number" inputmode="decimal" data-ex="'+ex.id+'" data-set="'+s+'" data-field="w" placeholder="'+fmtW(st.weight)+'">'+
          '<span class="su">'+ex.unit+'</span>'+
          '<input type="number" inputmode="numeric" data-ex="'+ex.id+'" data-set="'+s+'" data-field="reps" placeholder="'+tReps+'">'+
          '<span class="su">reps</span>'+
          '</div>';
      } else {
        setboxes += '<div class="setbox"><span>Set '+(s+1)+'</span>'+
          '<input type="number" inputmode="numeric" data-ex="'+ex.id+'" data-set="'+s+'" data-field="reps" placeholder="'+tReps+'"></div>';
      }
    }
    var lastTxt = "";
    if(st.history.length){
      var h = st.history[st.history.length-1];
      var parts = h.sets.map(function(x){
        if(isW){
          var w = (x.w!=null) ? x.w : h.w;
          return (w!=null ? fmtW(w)+ex.unit+"×" : "") + x.reps;
        }
        if(ex.time) return x.reps+"s";
        return x.reps;
      });
      var tail = isW ? "" : (ex.time ? "" : " "+unitLab);
      lastTxt = '<div class="last">Last ('+h.date+'): '+parts.join(", ")+tail+'</div>';
    } else if(ex.lastSession){
      lastTxt = '<div class="last">Last: '+ex.lastSession+'</div>';
    }
    var sideTag = ex.side ? ' · per side' : (ex.perHand ? ' · per hand':'');
    var formQuery = encodeURIComponent(ex.name.replace(/[—–()]/g," ").replace(/\s+/g," ").trim()+" proper form");
    var formUrl = "https://www.youtube.com/results?search_query="+formQuery;
    card.innerHTML =
      '<div class="h"><div><div class="name">'+ex.name+'</div>'+
      '<div class="scheme">'+ex.sets+' × '+ex.lo+'–'+ex.hi+(ex.time?' s':' reps')+sideTag+' · <a class="formlink" href="'+formUrl+'" target="_blank" rel="noopener noreferrer">📖 Form</a></div></div>'+
      '<div class="tgt"><div class="w">'+tgtBig+'</div><div class="rng">'+tgtRng+'</div></div></div>'+
      '<div class="sets">'+setboxes+'</div>'+ lastTxt;
    list.appendChild(card);
  });
}

function renderTraining(){ renderWkPicker(); renderExercises(); document.getElementById("sessionSummary").innerHTML=""; }

document.getElementById("saveSession").addEventListener("click", function(){
  var name = ROTATION[state.selWk];
  var def = PROGRAM[name];
  var results = [];
  var sessionLog = [];
  var anyLogged = false;
  def.ex.forEach(function(ex){
    var st = exState(ex);
    var isW = ex.inc>0;
    var inputs = document.querySelectorAll('input[data-ex="'+ex.id+'"]');
    var setMap = {};
    inputs.forEach(function(inp){
      var idx = inp.getAttribute('data-set');
      var field = inp.getAttribute('data-field') || 'reps';
      if(!setMap[idx]) setMap[idx] = {};
      var raw = (inp.value || '').replace(',', '.');
      var v = parseFloat(raw);
      if(!isNaN(v) && v>0) setMap[idx][field] = v;
    });
    var sets = [];
    Object.keys(setMap).sort(function(a,b){return +a - +b;}).forEach(function(k){
      var s = setMap[k];
      if(s.reps && s.reps>0){
        if(isW && s.w==null) s.w = st.weight;
        sets.push(s);
      }
    });
    if(!sets.length) return;
    anyLogged = true;
    var entry = { date: todayKey(), sets: sets };
    st.history.push(entry);
    var msg, up=false;
    if(isW){
      var allTopAtWorking = sets.length>=ex.sets && sets.every(function(s){
        return s.reps>=ex.hi && (s.w||0)>=st.weight;
      });
      if(allTopAtWorking){
        st.weight = round(st.weight + ex.inc); up=true;
        msg = "▲ "+ex.name+" → "+fmtW(st.weight)+ex.unit+" next time (reset to "+ex.lo+" reps).";
      } else {
        var underWeight = sets.some(function(s){ return (s.w||0) < st.weight; });
        msg = underWeight
          ? "= "+ex.name+": some sets under "+fmtW(st.weight)+ex.unit+" — climb back to working weight before bumping."
          : "= "+ex.name+": stay "+fmtW(st.weight)+ex.unit+", chase "+ex.hi+" reps.";
      }
    } else {
      var allTopBW = sets.every(function(s){ return s.reps>=ex.hi; });
      if(ex.vestAt){
        msg = allTopBW ? "▲ Pull-ups: add the 12 kg vest next time, drop back to ~"+ex.lo+" reps."
                       : "= Pull-ups: build reps toward "+ex.hi+" clean on every set.";
      } else if(ex.time){
        msg = allTopBW ? "▲ Plank: make it harder — add a 5 s pause / slower breathing."
                       : "= Plank: add seconds toward "+ex.hi+"s.";
      } else {
        msg = allTopBW ? "▲ "+ex.name+": slow the tempo / add a pause to keep it hard."
                       : "= "+ex.name+": add reps toward "+ex.hi+".";
      }
    }
    results.push({msg:msg, up:up});
    sessionLog.push({name: ex.name, sets: sets, isW: isW, time: !!ex.time, unit: ex.unit});
  });
  if(!anyLogged){ toast("Enter at least one set first"); return; }
  var doneName = ROTATION[state.selWk];
  state.train.lastDone = state.selWk;
  state.selWk = suggestedIndex();
  save();
  var summaryText = "";
  if(sessionLog.length){
    var lineExs = sessionLog.map(function(e){ return e.name + ' ' + fmtSetsForSummary(e); });
    summaryText = doneName + " done — " + lineExs.join(', ');
  }
  window._lastSession = summaryText;
  if(navigator.clipboard && summaryText){
    navigator.clipboard.writeText(summaryText).catch(function(){});
  }
  var html = '<div class="summary"><div style="font-weight:800;margin-bottom:6px;color:var(--green)">✅ Session saved — next-time targets</div>';
  results.forEach(function(r){ html += '<div class="li"><span>'+(r.up?'💪':'•')+'</span><span>'+r.msg.replace(/^[▲=]\s/,'')+'</span></div>'; });
  html += '<div class="li tiny muted" style="margin-top:4px">Up next: <b>'+ROTATION[state.selWk]+'</b></div>';
  if(summaryText){
    html += '<div style="margin-top:12px;padding-top:10px;border-top:1px dashed #d7e7dd">'+
      '<button class="btn btn-green" id="shareCoach" style="width:100%">📤 Send to Coach (Dispatch)</button>'+
      '<div class="tiny muted" style="margin-top:6px;text-align:center">Summary copied to clipboard — paste into Dispatch if needed</div>'+
      '</div>';
  }
  html += '</div>';
  document.getElementById("sessionSummary").innerHTML = html;
  var sc = document.getElementById("shareCoach");
  if(sc) sc.addEventListener("click", shareSession);
  renderWkPicker(); renderExercises();
  // Auto-open the share sheet so Save = one tap
  if(summaryText) shareSession();
  toast("Saved · share sheet opened");
  window.scrollTo({top:0,behavior:"smooth"});
});

/* reset */
document.getElementById("settingsBtn").addEventListener("click", function(){
  if(confirm("Reset ALL data (workouts, weights, food log) back to the starting program? This can't be undone.")){
    state={ targets:Object.assign({},DEFAULT_TARGETS), food:{}, train:{ ex:{}, lastDone:0 }, selWk:1 };
    save(); renderTraining(); toast("Reset to starting program");
  }
});

/* toast */
var toastT=null;
function toast(msg){
  var el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove("show"); }, 2600);
}

/* init */
function init(){
  var now=new Date();
  document.getElementById("dateSub").textContent = now.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
  if(typeof state.train.lastDone!=="number" || state.train.lastDone>=ROTATION.length) state.train.lastDone=-1;
  if(typeof state.selWk!=="number" || state.selWk<0 || state.selWk>=ROTATION.length) state.selWk=suggestedIndex();
  renderTraining();
}
init();
</script>
</body>
</html>
